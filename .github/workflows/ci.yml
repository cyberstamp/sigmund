name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OPENSSL_DIR: /opt/openssl
      LD_LIBRARY_PATH: /opt/openssl/lib64
      PKG_CONFIG_PATH: /opt/openssl/lib64/pkgconfig

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install sq build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cargo rustc gcc clang libsqlite3-dev \
            pkg-config nettle-dev capnproto

      - name: Cache OpenSSL 3.5
        id: cache-openssl
        uses: actions/cache@v5
        with:
          path: /opt/openssl
          key: openssl-3.5.0-${{ runner.os }}

      - name: Build OpenSSL 3.5
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/openssl/openssl/releases/download/openssl-3.5.0/openssl-3.5.0.tar.gz
          tar xf openssl-3.5.0.tar.gz
          cd openssl-3.5.0
          ./config --prefix=/opt/openssl --openssldir=/opt/openssl
          make -j$(nproc)
          sudo make install_sw

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/sq
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/sequoia-sq-pqc/target
          key: sq-pqc-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Build PQC-enabled sq
        run: |
          if sq version 2>/dev/null; then
            echo "sq already cached"
          else
            git clone --branch pqc --depth 1 \
              https://gitlab.com/sequoia-pgp/sequoia-sq.git /tmp/sequoia-sq-pqc

            cat >> /tmp/sequoia-sq-pqc/Cargo.toml << 'EOF'

          [patch.crates-io]
          sequoia-openpgp = { git = "https://gitlab.com/sequoia-pgp/sequoia.git", branch = "pqc" }
          buffered-reader = { git = "https://gitlab.com/sequoia-pgp/sequoia.git", branch = "pqc" }
          sequoia-autocrypt = { git = "https://gitlab.com/sequoia-pgp/sequoia.git", branch = "pqc" }
          sequoia-net = { git = "https://gitlab.com/sequoia-pgp/sequoia.git", branch = "pqc" }
          sequoia-ipc = { git = "https://gitlab.com/sequoia-pgp/sequoia.git", branch = "pqc" }
          EOF

            cd /tmp/sequoia-sq-pqc
            cargo install --path . --features crypto-openssl --no-default-features
          fi
          sq version

      - name: Set up GPG test key
        run: |
          gpg --batch --gen-key <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 2048
          Name-Real: CI Test
          Name-Email: ci@sigmund.test
          Expire-Date: 0
          EOF

      - name: Build and test
        run: mvn verify
