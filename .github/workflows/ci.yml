name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SQ_VERSION: '1.4.0'
      SQ_CARGO_FEATURES: crypto-openssl
      OPENSSL_VERSION: '3.5.0'
      OPENSSL_DIR: /opt/openssl
      LD_LIBRARY_PATH: /opt/openssl/lib64
      PKG_CONFIG_PATH: /opt/openssl/lib64/pkgconfig

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install sq build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cargo rustc gcc clang libsqlite3-dev \
            pkg-config nettle-dev capnproto

      - name: Cache OpenSSL 3.5
        id: cache-openssl
        uses: actions/cache@v6
        with:
          path: /opt/openssl
          key: openssl-${{ env.OPENSSL_VERSION }}-${{ runner.os }}

      - name: Build OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/openssl/openssl/releases/download/openssl-$OPENSSL_VERSION/openssl-$OPENSSL_VERSION.tar.gz"
          tar xf "openssl-$OPENSSL_VERSION.tar.gz"
          cd "openssl-$OPENSSL_VERSION"
          ./config --prefix=/opt/openssl --openssldir=/opt/openssl
          make -j$(nproc)
          sudo make install_sw

      - name: Cache sq binary
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/sq
          key: sq-${{ env.SQ_VERSION }}-${{ env.SQ_CARGO_FEATURES }}-openssl${{ env.OPENSSL_VERSION }}-${{ runner.os }}

      - name: Install sq
        run: |
          if sq version 2>/dev/null | grep -q "$SQ_VERSION"; then
            echo "sq $SQ_VERSION already cached"
          else
            cargo install "sequoia-sq@$SQ_VERSION" --features "$SQ_CARGO_FEATURES" --no-default-features
          fi
          sq version

      - name: Set up GPG test key
        run: |
          gpg --batch --gen-key <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 2048
          Name-Real: CI Test
          Name-Email: ci@sigmund.test
          Expire-Date: 0
          EOF

      - name: Build and test
        run: mvn verify

      - name: Verify PQC integration tests ran
        run: |
          report=core/target/surefire-reports/io.github.cyberstamp.sigmund.core.RoundTripIntegrationTest.txt
          if [ ! -f "$report" ] || ! grep 'Tests run:' "$report" | grep -qvE 'Tests run: 0,'; then
            echo "::error::RoundTripIntegrationTest was not executed — PQC tests were silently skipped"
            exit 1
          fi
